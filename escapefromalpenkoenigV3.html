<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escape from Alpenkönig</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #33ff33;
            --text-highlight: #ffcc00;
            --text-action: #ff33ff;
            --border-color: #555555;
            --inv-bg: #111111;
        }

        * {
            box-sizing: border-box;
            overscroll-behavior-y: none;
        }

        body {
            background-color: #0c0c0c;
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            height: 100%;
            max-width: 900px;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            border: none;
        }

        @media (min-width: 901px) {
            #game-container {
                height: 95vh;
                border: 4px solid var(--border-color);
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(51, 255, 51, 0.2);
            }
        }

        header {
            background-color: #222;
            color: var(--text-highlight);
            text-align: center;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            letter-spacing: 2px;
            flex: 0 0 auto;
            z-index: 10;
        }

        #screen {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-bottom: 2px solid var(--border-color);
            background: linear-gradient(to bottom, #0a0a0a, #000000);
        }

        #image-container {
            flex: 0 0 auto;
            height: 28vh;
            min-height: 150px;
            background: #000;
            border-bottom: 2px dashed #333;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        #text-container {
            flex: 1 1 auto;
            padding: 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #scene-title {
            color: var(--text-action);
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-decoration: underline;
        }

        #story {
            line-height: 1.5;
        }

        #message-box {
            color: var(--text-highlight);
            font-style: italic;
            margin-top: 15px;
            min-height: 1.5em;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        #lower-panel {
            flex: 0 0 38vh;
            min-height: 250px;
            display: flex;
            flex-direction: column;
        }

        #choices-container {
            flex: 1 1 auto;
            padding: 10px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .choice-btn {
            display: block;
            width: 100%;
            background-color: transparent;
            color: var(--text-main);
            border: 1px dashed var(--border-color);
            padding: 12px 10px;
            margin-bottom: 8px;
            font-family: inherit;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .choice-btn:hover,
        .choice-btn:active {
            background-color: var(--text-main);
            color: var(--bg-color);
            border-style: solid;
        }

        .choice-btn.examine {
            color: #88ccff;
            border-color: #335577;
        }

        .choice-btn.examine:hover,
        .choice-btn.examine:active {
            background-color: #88ccff;
            color: #000;
        }

        #inventory-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }

        #inventory-modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-color);
            border: 2px solid var(--text-highlight);
            border-radius: 8px;
            padding: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
            color: var(--text-main);
        }

        .modal-content h3 {
            color: var(--text-highlight);
            text-align: center;
            margin-top: 0;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        #inventory-list {
            list-style-type: none;
            padding: 0;
            margin: 0 0 20px 0;
            font-size: 1rem;
            max-height: 50vh;
            overflow-y: auto;
        }

        #inventory-list li {
            padding: 12px 0;
            border-bottom: 1px dashed #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .use-btn {
            background: transparent;
            color: var(--text-action);
            border: 1px solid var(--text-action);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin-left: 10px;
            transition: all 0.2s;
        }

        .use-btn:hover,
        .use-btn:active {
            background: var(--text-action);
            color: #000;
        }

        #inv-toggle-btn {
            border-radius: 0;
            border: none;
            border-top: 2px solid var(--text-highlight);
            color: var(--text-highlight);
            text-align: center;
            font-weight: bold;
            background-color: #1a1a1a;
            padding: 15px;
            margin: 0;
            flex: 0 0 auto;
        }

        #inv-toggle-btn:hover,
        #inv-toggle-btn:active {
            background-color: var(--text-highlight);
            color: #000;
        }

        @media (max-width: 768px) {
            header {
                font-size: 1rem;
                padding: 8px;
            }

            #lower-panel {
                flex: 0 0 35vh;
            }

            .choice-btn {
                padding: 14px 10px;
                font-size: 0.95rem;
            }

            .use-btn {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-main);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <header>🏔️ ESCAPE FROM ALPENKÖNIG 🍻</header>

        <div id="screen">
            <div id="image-container"></div>
            <div id="text-container">
                <div id="scene-title">Lade...</div>
                <div id="story"></div>
                <div id="message-box"></div>
            </div>
        </div>

        <div id="lower-panel">
            <div id="choices-container">
                <div id="action-buttons"></div>
            </div>
            <button class="choice-btn" id="inv-toggle-btn" onclick="toggleInventory()">
                🎒 Inventar öffnen (<span id="inv-count">0</span>)
            </button>
        </div>
    </div>

    <div id="inventory-modal">
        <div class="modal-content">
            <h3>🎒 Dein Inventar</h3>
            <ul id="inventory-list"></ul>
            <button class="choice-btn"
                style="border-color: #ff3333; color: #ff3333; text-align: center; margin-top: 10px;"
                onclick="toggleInventory()">❌ Schließen</button>
        </div>
    </div>

    <script>
        // --- SPIELSTATUS ---
        let state = {
            knowsCode: false,
            hasNaOH: false,
            acidNeutralized: false,
            hasKey: false,
            saunaUnlocked: false,
            hasCrowbar: false,
            kellerUnlocked: false,
            doorToKellerOpen: false,
            hasOil: false,
            leverOiled: false,
            barricadeBroken: false,
            hasFlashlight: false,
            gangIlluminated: false,
            hasAkte: false,
            evidenceDestroyed: false,
            hasPen: false,
            circuitBridged: false,
            hasSlippers: false,
            wearingSlippers: false,
            hasBowlingball: false,
            ladderLowered: false,
            schnapsCount: 0,
            bierCount: 0,
            oldWomanAppeared: false,
            schnapsAfterWoman: 0,
            bierAfterWoman: 0
        };

        let currentRoom = '';

        // --- NACHRICHTEN SYSTEM ---
        function toggleInventory() {
            const modal = document.getElementById('inventory-modal');
            modal.classList.toggle('active');
        }

        function showMessage(msg) {
            const msgBox = document.getElementById('message-box');
            msgBox.innerText = `>> ${msg}`;
            msgBox.style.opacity = 0;
            setTimeout(() => msgBox.style.opacity = 1, 50);

            const textContainer = document.getElementById('text-container');
            setTimeout(() => textContainer.scrollTop = textContainer.scrollHeight, 100);
        }

        // --- ITEM BENUTZUNG ---
        function useItem(itemId) {
            toggleInventory();
            let msg = "Das ergibt hier keinen Sinn.";

            if (itemId === 'naoh') {
                if (currentRoom === 'schwimmbad' && !state.acidNeutralized) {
                    state.acidNeutralized = true;
                    msg = "Es zischt, blubbert und dampft! Die ätzende Lösung ist nun pH-neutral.";
                } else {
                    msg = "Natriumhydroxid einfach so zu verstreuen ist keine pädagogisch wertvolle Idee.";
                }
            }
            else if (itemId === 'key') {
                if (currentRoom === 'sauna_tuer' && !state.saunaUnlocked) {
                    state.saunaUnlocked = true;
                    currentRoom = 'bar'; // Automatische Flucht zurück zur Bar!
                    msg = "Der rostige Schlüssel knirscht, und das Schloss springt auf! Plötzlich ertönt ein lautes, unheimliches Kratzen aus den Wänden. Völlig aufgeschreckt fliehst du zurück zur Bar und versuchst, dich absolut unauffällig zu verhalten.";
                } else if (currentRoom === 'sauna_tuer' && state.saunaUnlocked) {
                    msg = "Das Schloss ist bereits offen, du brauchst den Schlüssel hier nicht mehr.";
                } else {
                    msg = "Der Schlüssel passt hier in kein Schlüsselloch.";
                }
            }
            else if (itemId === 'crowbar') {
                if (currentRoom === 'keller' && !state.barricadeBroken) {
                    state.barricadeBroken = true;
                    msg = "*KRRAAAACK!* Mit purer Hebelkraft reißst du die dicken Bretter ab. Der Weg ist frei!";
                } else if (currentRoom === 'keller' && state.barricadeBroken) {
                    msg = "Die Bretter sind bereits zerstört. Der Weg ist frei.";
                } else {
                    msg = "Du schwingst das Brecheisen drohend, aber es hilft in dieser Situation nicht weiter.";
                }
            }
            else if (itemId === 'code') {
                if (currentRoom === 'fitness' && !state.kellerUnlocked) {
                    state.kellerUnlocked = true;
                    msg = "*Biep Biep Biep - Klick!* Die schwere Luke am Boden des Fitnessraums schwingt auf und offenbart eine steile Eisentreppe.";
                } else if (currentRoom === 'fitness' && state.kellerUnlocked) {
                    msg = "Die Luke ist bereits offen.";
                } else {
                    msg = "Du murmelst mathematische Nullstellen vor dich hin. Niemand reagiert.";
                }
            }
            else if (itemId === 'oil') {
                if (currentRoom === 'heizung' && !state.leverOiled) {
                    state.leverOiled = true;
                    msg = "Du tropfst das trübe Maschinenöl auf das Gelenk des Hebels. Er lässt sich nun flüssig bewegen!";
                } else {
                    msg = "Du willst hier nicht alles ölig machen.";
                }
            }
            else if (itemId === 'pen') {
                if (currentRoom === 'konferenz' && !state.circuitBridged) {
                    state.circuitBridged = true;
                    msg = "Du klemmst den massiven Goldfüller zwischen die durchtrennten Kabel. Gold leitet hervorragend! Ein Riegel klickt und das Whiteboard schwingt auf.";
                } else {
                    msg = "Ein wunderschöner goldener Füller. Gut, um Sechsen unter Klausuren zu setzen, aber hier nutzlos.";
                }
            }
            else if (itemId === 'flashlight') {
                if (currentRoom === 'langer_gang' && !state.gangIlluminated) {
                    state.gangIlluminated = true;
                    msg = "*Klick*. Die Taschenlampe durchschneidet die Dunkelheit. Du siehst nun, worauf du trittst...";
                } else if (currentRoom === 'langer_gang' && state.gangIlluminated) {
                    msg = "Die Taschenlampe leuchtet bereits hell und zeigt dir den Weg.";
                } else {
                    msg = "Du schaltest die Taschenlampe an und wieder aus. Klick. Klack.";
                }
            }
            else if (itemId === 'slippers') {
                if (currentRoom === 'langer_gang' && !state.wearingSlippers) {
                    state.wearingSlippers = true;
                    msg = "Du tauschst deine harten Schuhe gegen die weichen Badeschlappen. Damit läufst du absolut lautlos wie ein Ninja.";
                } else if (currentRoom === 'langer_gang' && state.wearingSlippers) {
                    msg = "Du hast die bequemen Slipper bereits an den Füßen.";
                } else {
                    msg = "Du hältst die flauschigen Slipper in der Hand. Sehr weich. Zieh sie am besten an, wenn du lautlos sein musst.";
                }
            }
            else if (itemId === 'bowlingball') {
                if (currentRoom === 'leiter_loch' && !state.ladderLowered) {
                    state.ladderLowered = true;
                    msg = "Mit einem Ächzen wuchtest du die schwere Kugel in den Eimer des Seilzugs. Das Gegengewicht zieht die Leiter zu dir nach unten!";
                } else {
                    msg = "Die Bowlingkugel ist unglaublich schwer. Du willst sie eigentlich nur loswerden.";
                }
            }
            else if (itemId === 'akte') {
                if (currentRoom === 'tennishalle' && !state.evidenceDestroyed) {
                    state.evidenceDestroyed = true;
                    msg = "Der Aktenvernichter zieht die brisante Amtshaftungsklage gierig ein. *Rrrrrtsch!* Als das Papier zerstört ist, leuchtet das Sicherheitstor grün auf und entriegelt sich!";
                } else {
                    msg = "Du liest: '...Gemeinde Reith wusste von den Bauten. Die geheimen unterirdischen Komplexe des Hotel Alpenkönig sind strikt zu verschweigen...'";
                }
            }

            updateInventory();
            // WICHTIG: Immer erst showRoom ausführen, dann showMessage, damit die Meldung nicht gelöscht wird!
            showRoom(currentRoom);
            showMessage(msg);
        }

        // --- RÄUME, LOGIK & PIXEL-ART ---
        const rooms = {
            bar: {
                title: "Die Hotelbar",
                image: () => `<img src="${state.saunaUnlocked ? 'bar_nach_flucht.jpg' : 'Bar.jpg'}" />`,
                text: "Du stehst mit deiner Lehrergruppe an der Bar des 'Hotel Alpenkönig' in Seefeld. Der Skitag war sehr anstrengend, viele sind schon auf ihrem Zimmer, aber ihr wollt eigentlich nur noch in die Enzianhütte auf ein Bier.\n\nEin massiver Schneesturm blockiert allerdings den Haupteingang. Der mürrische Barkeeper poliert apathisch Gläser.",
                choices: [
                    {
                        type: 'examine', text: "Sprich mit dem Barkeeper", action: () => {
                            showRoom('bar');
                            showMessage("Barkeeper: 'Der alte Hausmeister hat tief im Keller einen Durchgang zur Tennishalle gebaut. Aber passen Sie auf... da unten gehen seltsame Dinge vor sich.'");
                        }
                    },
                    { type: 'examine', text: "Untersuche den klebrigen Bierdeckel", action: () => showRoom('bierdeckel') },
                    { type: 'action', text: "Gehe in den düsteren Flur", action: () => showRoom('flur') },
                    { type: 'action', text: "Gehe zur 'Alten Kegelbahn'", action: () => showRoom('kegelbahn') }
                ]
            },
            bierdeckel: {
                title: "Der klebrige Bierdeckel",
                image: () => `<img src="Bierdeckel.jpg" />`,
                text: "Jemand hat hastig Notizen hinterlassen:\n\n'PIN für den Zugang nach unten: f(x) = x² - 8x + 15. Die Nullstellen bilden den Code (Format: x1,x2 ohne Komma).'",
                choices: [
                    {
                        type: 'action', text: "Die mathematische Formel ins Gehirn brennen", condition: () => !state.knowsCode, action: () => {
                            state.knowsCode = true;
                            updateInventory();
                            showRoom('bar');
                            showMessage("x1=3 und x2=5. Der Code ist 0305! Eingeloggt.");
                        }
                    },
                    { type: 'action', text: "Zurück zur Bar", action: () => showRoom('bar') }
                ]
            },
            flur: {
                title: "Der dunkle Flur",
                image: () => `<img src="flur.jpg" />`,
                text: "Ein spärlich beleuchteter Flur. Viele Türen gehen von hier ab. Ein unbeaufsichtigter Reinigungswagen der Putzkolonne steht verlassen in der Ecke.",
                choices: [
                    {
                        type: 'examine', text: "Untersuche den Putzwagen", condition: () => !state.hasNaOH, action: () => {
                            state.hasNaOH = true;
                            updateInventory();
                            showRoom('flur');
                            showMessage("Du findest eine stark konzentrierte Dose Natriumhydroxid (NaOH). Eingepackt!");
                        }
                    },
                    { type: 'action', text: "Gehe zur Tür 'Schwimmbad'", action: () => showRoom('schwimmbad') },
                    { type: 'action', text: "Gehe zur Tür 'Konferenzräume'", action: () => showRoom('konferenz') },
                    { type: 'action', text: "Gehe zur Tür 'Fitnessraum'", action: () => showRoom('fitness') },
                    { type: 'action', text: "Gehe ins 'Treppenhaus'", action: () => showRoom('treppenhaus') },
                    { type: 'action', text: "Zurück zur Bar", action: () => showRoom('bar') }
                ]
            },
            treppenhaus: {
                title: "Zentrales Treppenhaus",
                image: () => `<img src="treppenhaus.jpg" />`,
                text: "Ein kaltes Betontreppenhaus. Nach oben geht es zu den noblen Suiten, unten riecht es seltsam süßlich und eher weniger nach Keller.",
                choices: [
                    { type: 'action', text: "Gehe nach oben", action: () => showRoom('suite') },
                    { type: 'action', text: "Gehe nach unten", action: () => state.saunaUnlocked ? showRoom('sauna_innen') : showRoom('sauna_tuer') },
                    { type: 'action', text: "Zurück in den Flur", action: () => showRoom('flur') }
                ]
            },
            suite: {
                title: "Präsidentensuite",
                image: () => `<img src="suite.jpg" />`,
                text: "Die teuerste Suite des Hauses. Vergoldete Wasserhähne und Samtvorhänge. Auf dem massiven Schreibtisch liegen Dokumente. Das Hotelmanagement hat hier wohl überstürzt gepackt.",
                choices: [
                    {
                        type: 'examine', text: "Durchsuche den Schreibtisch", condition: () => !state.hasAkte || !state.hasPen, action: () => {
                            let msg = "";
                            if (!state.hasAkte) { state.hasAkte = true; msg += "Du findest eine dicke Akte mit der Aufschrift 'Amtshaftungsklage Gemeinde Reith'. "; }
                            if (!state.hasPen) { state.hasPen = true; msg += "Außerdem steckst du einen goldenen Füller ein."; }
                            updateInventory();
                            showRoom('suite');
                            showMessage(msg.trim());
                        }
                    },
                    {
                        type: 'examine', text: "Untersuche das Badezimmer", condition: () => !state.hasSlippers, action: () => {
                            state.hasSlippers = true;
                            updateInventory();
                            showRoom('suite');
                            showMessage("Du nimmst ein Paar weiße Badeschlappen mit. Sehr flauschig.");
                        }
                    },
                    { type: 'action', text: "Zurück ins Treppenhaus", action: () => showRoom('treppenhaus') }
                ]
            },
            kegelbahn: {
                title: "Die alte Kegelbahn",
                image: () => `<img src="kegelbahn.jpg" />`,
                text: "Du stehst in einer staubigen, stillgelegten Kegelbahn im Untergeschoss. Die hölzernen Bahnen sind verzogen. Am Kugelrücklauf liegt allerlei Gerümpel.",
                choices: [
                    {
                        type: 'examine', text: "Durchsuche den Kugelrücklauf", condition: () => !state.hasFlashlight || !state.hasBowlingball, action: () => {
                            let msg = "";
                            if (!state.hasFlashlight) { state.hasFlashlight = true; msg += "Bingo! Eine alte, funktionierende Taschenlampe. "; }
                            if (!state.hasBowlingball) { state.hasBowlingball = true; msg += "Du steckst außerdem eine extrem schwere Bowlingkugel ein. "; }
                            updateInventory();
                            showRoom('kegelbahn');
                            showMessage(msg.trim());
                        }
                    },
                    { type: 'action', text: "Zurück zur Bar", action: () => showRoom('bar') }
                ]
            },
            konferenz: {
                title: "Konferenzraum 'Alpspitze'",
                image: () => `<img src="${state.circuitBridged ? 'konferenz_offenes_hinterzimmer.jpg' : 'konferenz.jpg'}" />`,
                text: "Ein typischer, trister Tagungsraum. Flipcharts und ein langes Whiteboard an der Wand. Dir fällt auf, dass ein kalter Luftzug hinter dem Whiteboard hervorweht.",
                choices: [
                    {
                        type: 'examine', text: "Untersuche das Whiteboard", condition: () => !state.circuitBridged, action: () => {
                            showRoom('konferenz');
                            showMessage("Das Board ist elektronisch verriegelt. Neben der Schiene ist ein Schaltkasten offen. Zwei Kabelenden hängen lose heraus, der Stromkreis ist unterbrochen.");
                        }
                    },
                    { type: 'action', text: "Gehe in das verborgene Hinterzimmer", condition: () => state.circuitBridged, action: () => showRoom('hinterzimmer') },
                    { type: 'action', text: "Zurück in den Flur", action: () => showRoom('flur') }
                ]
            },
            hinterzimmer: {
                title: "Das verborgene Hinterzimmer",
                image: () => `<img src="hinterzimmer.jpg" />`,
                text: "Ein extrem verstörender Raum. Der Boden ist mit alten, abgewetzten Zirkusmatten ausgelegt. In der Mitte steht ein metallener Gynäkologenstuhl mit Lederriemen. Wer auch immer hier verweilt hat... du willst ihn nicht kennen.",
                choices: [
                    {
                        type: 'examine', text: "Untersuche das rostige Regal in der Ecke", condition: () => !state.hasOil, action: () => {
                            state.hasOil = true;
                            updateInventory();
                            showRoom('hinterzimmer');
                            showMessage("Du findest eine alte Kanne mit trübem Schmieröl.");
                        }
                    },
                    { type: 'action', text: "Zurück in den Konferenzraum (Flucht!)", action: () => showRoom('konferenz') }
                ]
            },
            schwimmbad: {
                title: "Das stillgelegte Schwimmbad",
                image: () => `<img src="${!state.acidNeutralized ? 'schwimmbad.jpg' : (state.hasKey ? 'schwimmbad_neutralisierte_Saeure_ohne_Schluessel.jpg' : 'schwimmbad_neutralisierte_Saeure.jpg')}" />`,
                text: "Die blauen Kacheln sind dreckig. Am tiefsten Punkt des leeren Beckens hat sich eine trübe, übelriechende Pfütze (pH 1 Entkalker) gebildet. Darin glänzt ein messingfarbener Schlüssel.",
                choices: [
                    {
                        type: 'action', text: "Greife mit der Hand nach dem Schlüssel", condition: () => !state.acidNeutralized, action: () => {
                            showRoom('schwimmbad');
                            showMessage("Autsch! Das brennt höllisch! Die Säure muss erst neutralisiert werden.");
                        }
                    },
                    {
                        type: 'action', text: "Nimm den Schlüssel", condition: () => state.acidNeutralized && !state.hasKey, action: () => {
                            state.hasKey = true;
                            updateInventory();
                            showRoom('schwimmbad');
                            showMessage("Du hast den alten Saunaschlüssel aus dem neutralisierten Wasser gefischt.");
                        }
                    },
                    { type: 'action', text: "Zurück in den Flur", action: () => showRoom('flur') }
                ]
            },
            sauna_tuer: {
                title: "Vor der Sauna",
                image: () => `<img src="sauna.jpg" />`,
                text: "Die Tür aus massivem Holz ist mit einem verrosteten Vorhängeschloss verriegelt.",
                choices: [
                    { type: 'action', text: "Zurück ins Treppenhaus", action: () => showRoom('treppenhaus') }
                ]
            },
            sauna_innen: {
                title: "In der Sauna",
                image: () => `<img src="${state.hasCrowbar ? 'sauna_innen_ohne_Brecheisen.jpg' : 'sauna_innen.jpg'}" />`,
                text: "Es ist eiskalt. Ganz hinten unter dem Steinofen klemmt etwas Rotes.",
                choices: [
                    {
                        type: 'action', text: "Versuche das rote Ding herauszuholen.", condition: () => !state.hasCrowbar, action: () => {
                            state.hasCrowbar = true;
                            updateInventory();
                            showRoom('sauna_innen');
                            showMessage("Du zerrst ein massives rotes Brecheisen hervor. Sehr nützlich.");
                        }
                    },
                    { type: 'action', text: "Zurück ins Treppenhaus", action: () => showRoom('treppenhaus') }
                ]
            },
            fitness: {
                title: "Der Fitnessraum",
                image: () => `<img src="${state.kellerUnlocked ? 'fitness_luke_geoeffnet.jpg' : 'fitness.jpg'}" />`,
                text: "Rostige Hanteln. Im Boden befindet sich eine quadratische, schwere Metallluke mit einem elektronischen Tastenfeld daneben.",
                choices: [
                    { type: 'action', text: "Steige die geöffnete Luke hinab", condition: () => state.kellerUnlocked, action: () => showRoom('heizung') },
                    { type: 'action', text: "Zurück in den Flur", action: () => showRoom('flur') }
                ]
            },
            heizung: {
                title: "Der Heizungskeller",
                image: () => `<img src="${state.doorToKellerOpen ? 'heizung_tuer_offen.jpg' : 'heizung.jpg'}" />`,
                text: "Es ist unfassbar heiß hier. Riesige Kessel brummen. Mitten im Raum steht ein antiker Verhörstuhl mit dicken Lederriemen. Die Gemeinde Reith hat hier offenbar 'Sonderbefragungen' durchgeführt.\n\nAn der Wand ist eine gewaltige Eisentür, daneben ein völlig verrosteter Wandhebel.",
                choices: [
                    {
                        type: 'action', text: "Zieh den Hebel mit roher Gewalt", condition: () => !state.leverOiled && !state.doorToKellerOpen, action: () => {
                            showRoom('heizung');
                            showMessage("Er bewegt sich keinen Millimeter. Das Gelenk ist komplett festgerostet.");
                        }
                    },
                    {
                        type: 'action', text: "Betätige den geölten Hebel", condition: () => state.leverOiled && !state.doorToKellerOpen, action: () => {
                            state.doorToKellerOpen = true;
                            showRoom('heizung');
                            showMessage("*Quiiietsch... RUMMS!* Die schwere Eisentür gleitet beiseite.");
                        }
                    },
                    { type: 'action', text: "Gehe durch die Eisentür in die Tiefe", condition: () => state.doorToKellerOpen, action: () => showRoom('keller') },
                    { type: 'action', text: "Klettere die Leiter hoch zum Fitnessraum", action: () => showRoom('fitness') }
                ]
            },
            keller: {
                title: "Tiefe Kellergewölbe",
                image: () => `<img src="${state.barricadeBroken ? 'keller_druchgang_offen.jpg' : 'keller.jpg'}" />`,
                text: "Eine feuchte Tropfsteinhöhle tief im Fels. Ein Durchgang ist kreuz und quer mit dicken, nagelneuen Holzbrettern vernagelt.",
                choices: [
                    { type: 'action', text: "Krieche durch die aufgebrochene Öffnung", condition: () => state.barricadeBroken, action: () => showRoom('langer_gang') },
                    { type: 'action', text: "Zurück in den Heizungskeller", action: () => showRoom('heizung') }
                ]
            },
            langer_gang: {
                title: "Der Fledermaus-Gang",
                image: () => `<img src="${state.gangIlluminated ? 'langer_gang_erleuchtet.jpg' : 'langer_gang_dunkel.jpg'}" />`,
                text: state.gangIlluminated ?
                    "Im Licht der Taschenlampe erkennst du das Grauen: Der Boden des engen Tunnels ist komplett mit knochentrockenen Fledermauskadavern bedeckt. Tausende Fledermäuse hängen schlafend an der Decke. Jedes laute Knirschen wird sie aufwecken." :
                    "Es ist absolute Finsternis. Der Geruch nach Ammoniak beißt in der Nase. Unter deinen Füßen fühlst du etwas Unangenehmes.",
                choices: [
                    {
                        type: 'action', text: "Gehe blind weiter ins Dunkle", condition: () => !state.gangIlluminated, action: () => {
                            showRoom('keller');
                            showMessage("Du stolperst über etwas Matschiges, rutschst aus und fällst hin. Panisch rennst du zurück ins Licht!");
                        }
                    },
                    {
                        type: 'action', text: "Gehe vorsichtig durch den Tunnel", condition: () => state.gangIlluminated, action: () => {
                            if (!state.wearingSlippers) {
                                showRoom('keller');
                                showMessage("KNIRSCH! Deine harten Schuhe zermalmen die Knochen am Boden. Tausende Fledermäuse erwachen und greifen an! Du fliehst schreiend zurück.");
                            } else {
                                showRoom('leiter_loch');
                                showMessage("Dank der flauschigen Hotel-Slipper gleitest du wie ein Geist völlig lautlos über das Knochenfeld.");
                            }
                        }
                    },
                    { type: 'action', text: "Zurück in die Höhle", action: () => showRoom('keller') }
                ]
            },
            leiter_loch: {
                title: "Das Loch in der Wand",
                image: () => `<img src="${state.ladderLowered ? 'leiter_loch_mit_leiter_hoch.jpg' : 'leiter_loch.jpg'}" />`,
                text: "Am Ende des widerlichen Tunnels stehst vor einer Ziegelmauer mit einem großen Loch. Eine alte Holzleiter führt hinauf in das Loch, aber sie ist an einem Seilzug befestigt und hängt unerreichbar hoch in der Luft. An dem anderen Ende des Seils baumelt ein leerer Eimer.",
                choices: [
                    { type: 'action', text: "Klettere die herabgelassene Leiter hoch", condition: () => state.ladderLowered, action: () => showRoom('tennishalle') },
                    { type: 'action', text: "Zurück durch den Fledermaus-Gang", action: () => showRoom('langer_gang') }
                ]
            },
            tennishalle: {
                title: "Die alte Tennishalle",
                image: () => `<img src="${state.evidenceDestroyed ? 'tennishalle_tor_geoeffnet.jpg' : 'tennishalle.jpg'}" />`,
                text: "Deine Slipper knirschen auf rotem Sand. Du bist in der Tennishalle! Auf der gegenüberliegenden Seite blockiert jedoch ein modernes, schweres Gittertor den Ausgang zur Enzianhütte.\n\nNeben dem Tor steht eine bizarre Maschine: Ein Aktenvernichter mit einem roten Scannerauge. Ein Schild besagt: 'Tor-Entriegelung nur bei vollständiger Vernichtung der Beweismittel'.",
                choices: [
                    { type: 'action', text: "Öffne das entriegelte Tor und trete ins Licht!", condition: () => state.evidenceDestroyed, action: () => showRoom('finale') },
                    { type: 'action', text: "Zurück ins dunkle Loch", action: () => showRoom('leiter_loch') }
                ]
            },
            finale: {
                title: "🍻 Die Enzianhütte 🍻",
                image: () => `<img src="${state.oldWomanAppeared ? 'finale_mit_alter_frau.jpg' : 'finale.jpg'}" />`,
                text: () => {
                    if (state.oldWomanAppeared) {
                        return "DU HAST ES GESCHAFFT!\n\nDu stehst in der rustikalen Enzianhütte. Plötzlich hat sich eine rüstige alte Frau zu euch an den Tresen gesellt. Sie behauptet lautstark, eine ehemalige Skirennläuferin zu sein, und schmettert ohrenbetäubende Tiroler Lieder. Langsam wird es anstrengend...Manche von euch sind allerdings mehr im Fokus als andere.";
                    } else {
                        return "DU HAST ES GESCHAFFT!\n\nDu stehst hinter dem Tresen der rustikalen Enzianhütte. Der Wirt schaut verdutzt, greift dann aber grinsend zur Flasche Zirbenschnaps und zapft Bier. Du hast das finstere Geheimnis der Gemeinde Reith überlebt und alle Beweise (notgedrungen) vernichtet. Das Feiern kann beginnen!";
                    }
                },
                choices: [
                    {
                        type: 'action', text: "Trinke einen Zirbenschnaps!", action: () => {
                            if (state.oldWomanAppeared) {
                                state.schnapsAfterWoman++;
                                let prostStr = "Prost! ".repeat(state.schnapsCount + state.bierCount + state.schnapsAfterWoman + state.bierAfterWoman).trim();
                                if (state.schnapsAfterWoman >= 4) {
                                    alert(`${prostStr} Du hast das Spiel komplett durchgespielt (und bist sturzbetrunken). Zeit fürs Bett!`);
                                    location.reload();
                                } else {
                                    showRoom('finale');
                                    showMessage(`${prostStr} Der Schnaps brennt. Die alte Frau singt weiter.`);
                                }
                            } else {
                                state.schnapsCount++;
                                let prostStr = "Prost! ".repeat(state.schnapsCount + state.bierCount).trim();
                                if ((state.schnapsCount + state.bierCount) >= 3 && !state.oldWomanAppeared) {
                                    state.oldWomanAppeared = true;
                                    showRoom('finale');
                                    showMessage(`${prostStr} Plötzlich betritt eine alte Frau die Hütte und steuert direkt auf euch zu!`);
                                } else if (state.schnapsCount >= 5) {
                                    alert(`${prostStr} Das war einer zu viel. Du fällst besoffen vom Hocker. Zeit fürs Bett!`);
                                    location.reload();
                                } else {
                                    showRoom('finale');
                                    showMessage(`${prostStr} Der Schnaps brennt gut.`);
                                }
                            }
                        }
                    },
                    {
                        type: 'action', text: "Trinke ein frisches Bier!", action: () => {
                            if (state.oldWomanAppeared) {
                                state.bierAfterWoman++;
                                let prostStr = "Prost! ".repeat(state.schnapsCount + state.bierCount + state.schnapsAfterWoman + state.bierAfterWoman).trim();
                                if (state.bierAfterWoman >= 5) {
                                    alert(`${prostStr} Du hast das Spiel komplett durchgespielt (und bist sturzbetrunken). Zeit fürs Bett!`);
                                    location.reload();
                                } else {
                                    showRoom('finale');
                                    showMessage(`${prostStr} Kühles Bier. Die alte Frau singt lauter.`);
                                }
                            } else {
                                state.bierCount++;
                                let prostStr = "Prost! ".repeat(state.schnapsCount + state.bierCount).trim();
                                if ((state.schnapsCount + state.bierCount) >= 3 && !state.oldWomanAppeared) {
                                    state.oldWomanAppeared = true;
                                    showRoom('finale');
                                    showMessage(`${prostStr} Plötzlich betritt eine alte Frau die Hütte und steuert direkt auf euch zu!`);
                                } else if (state.bierCount >= 5) {
                                    alert(`${prostStr} Das war eins zu viel. Du fällst besoffen vom Hocker. Zeit fürs Bett!`);
                                    location.reload();
                                } else {
                                    showRoom('finale');
                                    showMessage(`${prostStr} Ein herrlich kühles Bier.`);
                                }
                            }
                        }
                    },
                    { type: 'action', text: "Spiel beenden und neu starten", action: () => location.reload() }
                ]
            }
        };

        // --- UI UPDATES ---
        function updateInventory() {
            const invList = document.getElementById('inventory-list');
            const invCount = document.getElementById('inv-count');
            invList.innerHTML = '';

            let items = [];
            if (state.knowsCode) items.push({ id: 'code', name: "🧠 Code: 0305" });
            if (state.hasKey) items.push({ id: 'key', name: "🔑 Messing-Schlüssel" });
            if (state.hasCrowbar) items.push({ id: 'crowbar', name: "🔧 Brecheisen" });
            if (state.hasFlashlight) items.push({ id: 'flashlight', name: "🔦 Taschenlampe" });
            if (state.hasSlippers) items.push({ id: 'slippers', name: "🩴 Badeschlappen" });

            if (state.hasNaOH && !state.acidNeutralized) items.push({ id: 'naoh', name: "🧪 Natriumhydroxid" });
            if (state.hasOil && !state.leverOiled) items.push({ id: 'oil', name: "🛢️ Schmieröl" });
            if (state.hasPen && !state.circuitBridged) items.push({ id: 'pen', name: "✒️ Goldener Füller" });
            if (state.hasBowlingball && !state.ladderLowered) items.push({ id: 'bowlingball', name: "🎳 Bowlingkugel" });
            if (state.hasAkte && !state.evidenceDestroyed) items.push({ id: 'akte', name: "📁 Akte 'Gemeinde Reith'" });

            if (invCount) invCount.innerText = items.length;

            if (items.length === 0) {
                invList.innerHTML = "<li style='color: #666; border:none; padding-left:0;'><i>Leere Taschen</i></li>";
            } else {
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${item.name}</span> <button class="use-btn" onclick="useItem('${item.id}')">Benutzen</button>`;
                    invList.appendChild(li);
                });
            }
        }

        function showRoom(roomKey) {
            currentRoom = roomKey;
            document.getElementById('message-box').innerText = "";

            const room = rooms[roomKey];
            document.getElementById('scene-title').innerText = room.title;
            document.getElementById('story').innerText = typeof room.text === 'function' ? room.text() : room.text;

            document.getElementById('image-container').innerHTML = room.image();

            const actionButtons = document.getElementById('action-buttons');
            if (actionButtons) {
                actionButtons.innerHTML = '';

                room.choices.forEach(choice => {
                    if (!choice.condition || choice.condition()) {
                        const btn = document.createElement('button');
                        btn.className = `choice-btn ${choice.type}`;

                        let prefix = choice.type === 'examine' ? '👀 Untersuche: ' : '▶ Gehe/Mache: ';
                        if (choice.text.includes("Zurück")) prefix = '🔙 ';

                        btn.innerText = prefix + choice.text;
                        btn.onclick = choice.action;
                        actionButtons.appendChild(btn);
                    }
                });
            }

            document.getElementById('text-container').scrollTop = 0;
            document.getElementById('choices-container').scrollTop = 0;
        }

        // --- SPIEL STARTEN ---
        updateInventory();
        showRoom('bar');

    </script>
</body>

</html>
